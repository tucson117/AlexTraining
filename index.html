<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alex训练">
<meta name="theme-color" content="#f4f7f9">
<link rel="manifest" href="manifest.json">
<title>Alex 排球力量训练</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================
   OCEAN DEPTHS THEME — v4.0
   Apple HomeKit 胶囊风格 · GitHub Pages 独立部署
   ================================================ */
:root {
  --navy: #1a2332;
  --teal: #2d8b8b; --teal-dark: #247070; --teal-light: #d6f0f0; --teal-bg: #eef8f8;
  --seafoam: #a8dadc; --seafoam-light: #d4eded;
  --bg: #f4f7f9; --surface: #ffffff; --surface2: #eef2f5;
  --border: #d8e0e6; --border2: #c4cfd8;
  --text: #1a2332; --text2: #495d6e; --text3: #546678;
  --green: #2d8b5e; --green-light: #d9f2e6; --green-bg: #edfaf3;
  --yellow: #c59316; --yellow-light: #fdf4d8; --yellow-bg: #fefbf0;
  --red: #c0392b; --red-light: #fce4e1;
  --orange: #d47824; --orange-light: #fde8d0;
  --purple: #6a5acd; --purple-light: #e8e4f8;
  --pink: #c0477a; --pink-light: #fce4ef;
  --radius: 16px; --radius-sm: 12px; --radius-pill: 50px;
  --shadow-sm: 0 1px 2px rgba(26,35,50,.06);
  --shadow: 0 2px 8px rgba(26,35,50,.08);
  --shadow-lg: 0 8px 24px rgba(26,35,50,.14);
  --font: 'Inter', -apple-system, 'PingFang SC', 'Segoe UI', sans-serif;
  --topbar-h: 56px;
  --bottombar-h: 64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{touch-action:manipulation;background:var(--bg);}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overscroll-behavior:none;}

/* ===== EDGE FADE OVERLAYS (light) ===== */
.fade-top,.fade-bottom{position:fixed;left:0;right:0;z-index:50;pointer-events:none;}
.fade-top{top:0;height:calc(env(safe-area-inset-top, 10px) + var(--topbar-h) + 30px);background:linear-gradient(to bottom, rgba(244,247,249,1) 0%, rgba(244,247,249,.9) 35%, rgba(244,247,249,.5) 70%, rgba(244,247,249,0) 100%);}
.fade-bottom{bottom:0;height:calc(env(safe-area-inset-bottom, 8px) + var(--bottombar-h) + 24px);background:linear-gradient(to top, rgba(244,247,249,1) 0%, rgba(244,247,249,.6) 50%, rgba(244,247,249,0) 100%);}

/* ===== FLOATING TOP BAR (capsule, split on scroll) ===== */
.topbar-wrap{position:fixed;top:calc(env(safe-area-inset-top, 10px) + 6px);left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 48px);max-width:560px;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:gap .35s cubic-bezier(.4,0,.2,1);}
.topbar-wrap.split{gap:calc(100% - 340px);}
/* Left capsule */
.topbar-left{display:flex;align-items:center;gap:10px;padding:0 18px;height:100%;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius-pill);border:1px solid rgba(200,210,220,.6);box-shadow:0 4px 20px rgba(26,35,50,.15),0 1px 3px rgba(26,35,50,.08);flex:1;min-width:0;transition:all .35s cubic-bezier(.4,0,.2,1);}
.topbar-wrap.split .topbar-left{flex:0 1 auto;}
.topbar-left .logo-svg{flex-shrink:0;transition:all .35s;}
.topbar-left h1{font-size:1.1em;font-weight:800;letter-spacing:-.03em;color:var(--navy);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .35s;}
.topbar-wrap.split .topbar-left h1{font-size:0.85em;}
.topbar-left .date{font-size:0.78em;font-weight:600;color:var(--teal-dark);transition:all .35s;overflow:hidden;max-height:20px;}
.topbar-wrap.split .topbar-left .date{max-height:0;opacity:0;margin:0;}
/* Right capsule (status) */
.status-pill{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;height:100%;min-width:88px;border-radius:var(--radius-pill);background:rgba(255,255,255,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,210,220,.6);font-size:0.75em;font-weight:600;color:var(--text2);white-space:nowrap;box-shadow:0 4px 20px rgba(26,35,50,.15),0 1px 3px rgba(26,35,50,.08);transition:all .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.status-pill .s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.status-pill.synced{color:var(--green);}.status-pill.synced .s-dot{background:var(--green);}
.status-pill.syncing{color:var(--teal);}.status-pill.syncing .s-dot{background:var(--teal);animation:pulse 1s infinite;}
.status-pill.saving{color:var(--yellow);}.status-pill.saving .s-dot{background:var(--yellow);animation:pulse 1s infinite;}
.status-pill.error{color:var(--red);}.status-pill.error .s-dot{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== FLOATING BOTTOM NAV (capsule) ===== */
.bottombar{position:fixed;bottom:calc(env(safe-area-inset-bottom, 8px) + 3px);left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 56px);max-width:360px;height:var(--bottombar-h);padding:6px 8px;display:flex;gap:4px;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius-pill);border:1px solid rgba(200,210,220,.6);box-shadow:0 4px 20px rgba(26,35,50,.15),0 1px 3px rgba(26,35,50,.08);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:var(--radius-pill);cursor:pointer;font-size:0.76em;font-weight:600;color:var(--text3);transition:all .2s;user-select:none;min-height:44px;-webkit-tap-highlight-color:transparent;}
.tab .tab-icon{line-height:0;display:flex;align-items:center;justify-content:center;}
.tab .tab-icon svg{width:18px;height:18px;}
.tab .tab-label{line-height:1;}
.tab.active{color:var(--teal-dark);font-weight:700;background:var(--teal-light);}
.tab:hover:not(.active){color:var(--text);background:var(--surface2);}
@media(min-width:601px){
  .bottombar{bottom:20px;max-width:400px;}
  .tab{flex-direction:row;gap:6px;}
}

/* ===== SCROLLABLE CONTENT ===== */
.app{max-width:680px;margin:0 auto;padding:calc(var(--topbar-h) + env(safe-area-inset-top, 10px) + 16px) 12px calc(var(--bottombar-h) + env(safe-area-inset-bottom, 8px) + 20px);}
.panel{display:none;}.panel.active{display:block;}

/* ===== CONTROL BAR ===== */
.control-bar{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:10px 14px;margin:8px 0;box-shadow:var(--shadow);}
.activities-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.activities-row .act-label{font-size:0.78em;font-weight:600;color:var(--text3);white-space:nowrap;}
.session-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rest-part{display:flex;align-items:center;gap:8px;}
.rest-part .rlabel{font-size:0.82em;font-weight:600;color:var(--text2);white-space:nowrap;}
.toggle-switch{position:relative;width:48px;height:26px;cursor:pointer;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:26px;transition:all .3s;}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:all .3s;box-shadow:var(--shadow-sm);}
.toggle-switch input:checked+.toggle-slider{background:var(--teal);}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(22px);}
.ctrl-div{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.session-chip{padding:5px 14px;border-radius:var(--radius-pill);border:2px solid var(--border);background:var(--surface);color:var(--text2);font-size:0.8em;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);min-height:36px;display:inline-flex;align-items:center;}
.session-chip.active{border-color:var(--teal);background:var(--teal);color:#fff;}
.btn-clear{padding:4px 10px;border-radius:var(--radius-pill);border:1.5px solid var(--red-light);background:var(--surface);color:var(--red);font-size:0.76em;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:3px;min-height:32px;}
.btn-clear:hover{background:var(--red-light);}
.rest-msg{text-align:center;padding:48px 24px;color:var(--text2);}
.rest-msg .icon{font-size:2.5em;margin-bottom:8px;}
.rest-msg p{font-size:1em;font-weight:600;}
.rest-msg .sub{font-size:0.82em;margin-top:6px;color:var(--text3);}

/* ===== MODULE CARD ===== */
.module-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin:12px 0;box-shadow:var(--shadow);overflow:hidden;}
.module-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.module-header:hover{background:var(--surface2);}
.module-header .module-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.78em;color:#fff;flex-shrink:0;}
.module-header h2{font-size:1em;flex:1;font-weight:700;}
.module-header .module-badge{font-size:0.75em;padding:4px 12px;border-radius:var(--radius-pill);font-weight:700;}
.module-header .module-badge.done{background:var(--green-bg);color:var(--green);}
.module-header .module-badge.partial{background:var(--yellow-bg);color:var(--yellow);}
.module-header .module-badge.empty{background:var(--surface2);color:var(--text3);}
.module-header .chevron{color:var(--text3);font-size:0.75em;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.module-card.collapsed .chevron{transform:rotate(-90deg);}
.module-body{max-height:8000px;overflow:hidden;transition:max-height .4s ease,opacity .3s ease;opacity:1;}
.module-card.collapsed .module-body{max-height:0;opacity:0;}
.icon-base-module{background:linear-gradient(135deg,var(--teal),var(--teal-dark));}
.icon-str-module{background:linear-gradient(135deg,#c0392b,#a02e22);}

/* ===== SECTION (flat) ===== */
.section{border-top:1px solid var(--border);}
.section-header{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.section-header:hover{background:var(--surface2);}
.section-header .sec-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.76em;color:#fff;flex-shrink:0;}
.section-header h3{font-size:0.92em;flex:1;font-weight:700;letter-spacing:-.01em;}
.section-header .time-badge{font-size:0.76em;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:10px;font-weight:500;}
.section-header .chevron{color:var(--text3);font-size:0.7em;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.section.collapsed .chevron{transform:rotate(-90deg);}
.section-body{max-height:3000px;overflow:hidden;transition:max-height .35s ease,opacity .25s ease;opacity:1;padding:4px 12px 8px;}
.section.collapsed .section-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0;}
.section-desc{padding:4px 16px 6px 52px;font-size:0.75em;color:var(--text3);line-height:1.5;}
.icon-warmup{background:linear-gradient(135deg,#e8a838,#d48c20);}
.icon-hip{background:linear-gradient(135deg,#7c6bdb,#5b4dba);}
.icon-stability{background:linear-gradient(135deg,#2d8b8b,#1f7070);}
.icon-core{background:linear-gradient(135deg,#d47824,#b5621a);}
.icon-ankle{background:linear-gradient(135deg,#c0477a,#a03060);}
.icon-strength{background:linear-gradient(135deg,#c0392b,#a02e22);}
.icon-cooldown{background:linear-gradient(135deg,#6b7d8d,#546678);}

/* ===== PRIORITY DIVIDER ===== */
.priority-divider{display:flex;align-items:center;gap:10px;padding:6px 4px;font-size:0.76em;font-weight:600;}
.priority-divider::before,.priority-divider::after{content:'';flex:1;height:1px;border-top:1px dashed var(--border2);}
.priority-divider.optional{color:var(--text3);}

/* ===== EXERCISE CAPSULE ===== */
.ex-capsule{display:flex;align-items:center;background:var(--surface2);border-radius:var(--radius);margin:5px 0;padding:0;transition:all .15s;border:1.5px solid transparent;}
.ex-capsule:hover{border-color:var(--border);}
.ex-capsule.done{opacity:.6;}
.ex-capsule.done .ex-name{text-decoration:line-through;text-decoration-thickness:2px;text-underline-offset:3px;color:var(--green);}
.ex-check-wrap{display:flex;align-items:center;justify-content:center;width:50px;flex-shrink:0;align-self:stretch;}
.ex-check{appearance:none;-webkit-appearance:none;width:34px;height:34px;border-radius:50%;border:2.5px solid var(--border2);background:var(--surface);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative;}
.ex-check:checked{border-color:var(--teal);background:var(--teal);}
.ex-check:checked::after{content:'\2713';color:#fff;font-size:14px;font-weight:700;position:absolute;}
.ex-check:hover{border-color:var(--teal-light);transform:scale(1.08);}
.ex-check:checked:hover{background:var(--teal-dark);}
.ex-text{flex:1;padding:10px 4px;min-width:0;}
.ex-row1{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ex-name{font-weight:700;font-size:0.85em;color:var(--navy);letter-spacing:-.01em;}
.ex-zh{font-size:0.78em;color:var(--text2);}
.opt-tag{font-size:0.6em;font-weight:600;color:var(--text3);background:var(--surface);padding:1px 6px;border-radius:4px;}
.ex-row2{font-size:0.75em;color:var(--text3);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap;}
.ex-row2 .sets{color:var(--teal-dark);font-weight:600;}
.ex-row2 .purpose{font-style:italic;}
.ex-actions{display:flex;align-items:center;gap:4px;padding:0 8px;flex-shrink:0;}
.ex-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75em;font-weight:700;transition:all .15s;-webkit-tap-highlight-color:transparent;text-decoration:none;}
.ex-btn-tip{background:var(--teal-bg);color:var(--teal);border:1.5px solid var(--teal-light);}
.ex-btn-tip:hover{background:var(--teal);color:#fff;}
.ex-btn-yt{background:var(--red-light);color:var(--red);border:1.5px solid transparent;}
.ex-btn-yt:hover{background:var(--red);color:#fff;}
.ex-inputs{display:flex;gap:6px;padding:0 12px 6px 54px;opacity:.7;transition:opacity .2s;}
.ex-capsule:hover+.ex-inputs,.ex-inputs:focus-within{opacity:1;}
.ex-inputs input{background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:5px 8px;font-size:0.76em;font-family:var(--font);transition:all .2s;min-height:36px;}
.ex-inputs input:focus{border-color:var(--teal);outline:none;box-shadow:0 0 0 2px var(--teal-light);}
.ex-inputs input::placeholder{color:var(--text3);font-style:italic;}
.ex-inputs input.actual{flex:1;min-width:0;}
.ex-inputs input.note{flex:2;min-width:0;}

/* Superset / Rope */
.superset-label{display:flex;align-items:center;gap:8px;padding:4px 4px;font-size:0.76em;color:var(--orange);font-weight:700;}
.superset-label::before,.superset-label::after{content:'';flex:1;height:1px;background:var(--orange-light);}
.rope-break{text-align:center;padding:4px;font-size:0.76em;color:var(--yellow);background:var(--yellow-bg);border-radius:8px;margin:4px 0;font-weight:500;}

/* ===== MONITORING ===== */
.monitoring{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin:12px 0;box-shadow:var(--shadow);}
.monitoring h3{font-size:0.95em;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700;}
.monitoring h3::before{content:'';display:inline-block;width:4px;height:18px;background:var(--yellow);border-radius:2px;}
.monitor-item{padding:8px 0;border-bottom:1px solid var(--surface2);}
.monitor-item:last-child{border-bottom:none;}
.monitor-item .q-text{font-size:0.85em;font-weight:600;margin-bottom:6px;line-height:1.4;}

/* ===== NOTES ===== */
.session-notes{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin:12px 0;box-shadow:var(--shadow);}
.session-notes h3{font-size:0.92em;margin-bottom:8px;font-weight:700;}
.session-notes textarea{width:100%;background:var(--surface2);border:2px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-size:0.82em;resize:vertical;min-height:70px;font-family:var(--font);line-height:1.6;transition:all .2s;}
.session-notes textarea:focus{border-color:var(--teal);outline:none;background:var(--surface);box-shadow:0 0 0 3px var(--teal-light);}
.session-notes textarea::placeholder{color:var(--text3);font-style:italic;}

/* ===== CHIPS ===== */
.chip-group{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:5px 12px;border-radius:var(--radius-pill);border:2px solid var(--border);background:var(--surface);color:var(--text2);font-size:0.78em;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none;-webkit-tap-highlight-color:transparent;}
.chip:hover{border-color:var(--teal-light);background:var(--teal-bg);}
.chip.selected{border-color:var(--teal);background:var(--teal);color:#fff;font-weight:600;}
.chip.warn.selected{border-color:var(--yellow);background:var(--yellow);color:#fff;}
.chip.danger.selected{border-color:var(--red);background:var(--red);color:#fff;}
.chip.multi-sel.selected{border-color:var(--purple);background:var(--purple);color:#fff;font-weight:600;}
.chip.mini{padding:4px 10px;font-size:0.76em;}

/* Bottom Sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(26,35,50,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s ease;backdrop-filter:blur(2px);}
.sheet-overlay.show{opacity:1;pointer-events:auto;}
.sheet-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 32px;z-index:301;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:60vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(26,35,50,.15);}
.sheet-overlay.show+.sheet-panel,.sheet-panel.show{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-weight:700;font-size:1em;margin-bottom:4px;color:var(--navy);}
.sheet-subtitle{font-size:0.78em;color:var(--teal);font-weight:600;margin-bottom:10px;}
.sheet-body{font-size:0.88em;color:var(--text);line-height:1.7;}
.sheet-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ===== CALENDAR ===== */
.cal-nav{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
.cal-nav button{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:8px 20px;border-radius:var(--radius-pill);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s;}
.cal-nav button:hover{background:var(--surface2);}
.cal-nav span{font-weight:800;font-size:1.05em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0;}
.cal-header{text-align:center;font-size:0.76em;color:var(--text3);padding:6px 2px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cal-day{text-align:center;padding:8px 2px;border-radius:10px;font-size:0.82em;cursor:pointer;min-height:48px;background:var(--surface);border:1.5px solid transparent;transition:all .15s;}
.cal-day.empty{background:transparent;cursor:default;}
.cal-day.has-session{border-color:var(--border);}
.cal-day.has-session.full{border-left:4px solid var(--teal);}
.cal-day.has-session.base-only{border-left:4px solid var(--seafoam);}
.cal-day.has-session.rest{border-left:4px solid var(--surface2);}
.cal-day.has-session.multi{border-right:4px solid var(--purple);}
.cal-day.today{outline:2.5px solid var(--teal);outline-offset:-1px;font-weight:800;}
.cal-day:hover:not(.empty){background:var(--teal-bg);}
.cal-day .day-num{font-weight:600;}
.cal-day .completion{font-size:0.75em;color:var(--green);font-weight:700;}
.cal-day .rest-mark{font-size:0.75em;color:var(--text3);}

/* History */
.history-detail{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin:10px 0;box-shadow:var(--shadow);}
.history-detail h3{font-size:1em;font-weight:700;margin-bottom:4px;}
.history-detail .meta{font-size:0.75em;color:var(--text3);margin-bottom:12px;}
.history-section-title{font-size:0.85em;font-weight:700;color:var(--teal);margin:12px 0 6px;padding-top:8px;border-top:1px solid var(--surface2);}
.history-exercise{padding:3px 0;font-size:0.82em;display:flex;gap:8px;align-items:baseline;line-height:1.4;}
.history-exercise .mark{font-weight:800;width:16px;}
.history-exercise .mark.done{color:var(--green);}
.history-exercise .mark.skip{color:var(--text3);}
.history-exercise .actual-val{color:var(--teal);font-weight:500;}
.history-exercise .note-val{color:var(--text2);font-style:italic;}
.history-notes{margin-top:12px;padding:12px;background:var(--surface2);border-radius:10px;font-size:0.82em;white-space:pre-wrap;line-height:1.6;border:1px solid var(--border);}
.history-monitoring{margin-top:12px;}
.history-monitoring .mon-title{font-size:0.85em;font-weight:700;color:var(--yellow);margin-bottom:6px;}
.history-monitoring .mon-item{font-size:0.82em;padding:2px 0;line-height:1.4;}

/* ===== REPORT ===== */
.report{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin:10px 0;box-shadow:var(--shadow);}
.report h3{font-size:1.05em;font-weight:800;margin-bottom:4px;}
.report .subtitle{font-size:0.78em;color:var(--text3);margin-bottom:14px;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0;}
.stat-card{background:var(--surface2);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);}
.stat-card .value{font-size:1.7em;font-weight:800;color:var(--teal-dark);}
.stat-card .label{font-size:0.75em;color:var(--text2);margin-top:2px;font-weight:500;}
.progress-bar{background:var(--surface2);border-radius:10px;height:6px;margin:4px 0;overflow:hidden;}
.progress-bar .fill{height:100%;border-radius:10px;transition:width .4s ease;}
.progress-item{margin:8px 0;}
.progress-item .plabel{display:flex;justify-content:space-between;font-size:0.82em;margin-bottom:3px;font-weight:500;}
.report-section{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);}
.report-section h4{font-size:0.95em;font-weight:700;margin-bottom:10px;}

/* ===== SETTINGS ===== */
.data-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin:10px 0;box-shadow:var(--shadow);}
.data-section h3{font-size:0.95em;font-weight:700;margin-bottom:8px;}
.data-section p{font-size:0.82em;color:var(--text2);margin-bottom:12px;line-height:1.6;}
.btn-export{background:var(--teal);color:#fff;border:none;padding:10px 22px;border-radius:var(--radius-pill);cursor:pointer;font-size:0.85em;font-weight:600;font-family:var(--font);transition:all .15s;}
.btn-export:hover{background:var(--teal-dark);}
.btn-secondary{background:var(--surface);color:var(--text2);border:2px solid var(--border);padding:8px 20px;border-radius:var(--radius-pill);cursor:pointer;font-size:0.82em;font-weight:600;font-family:var(--font);}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:calc(var(--bottombar-h) + env(safe-area-inset-bottom, 8px) + 14px);left:50%;transform:translateX(-50%) translateY(30px);background:var(--navy);color:#fff;padding:14px 28px;border-radius:24px;font-size:0.88em;font-weight:600;z-index:200;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.34,1.56,.64,1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.loading-overlay .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{color:var(--text2);font-size:.9em;}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .app{padding:calc(var(--topbar-h) + env(safe-area-inset-top, 10px) + 14px) 8px calc(var(--bottombar-h) + env(safe-area-inset-bottom, 8px) + 20px);}
  .section-header{padding:8px 14px;}
  .section-body{padding:4px 8px 8px;}
  .ex-inputs{padding-left:42px;}
  .ex-inputs input.actual{flex:1;min-width:0;}
  .ex-inputs input.note{flex:2;min-width:0;}
  .stat-grid{grid-template-columns:1fr 1fr;}
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

// ============================================

// ============================================
const EX={
  // === 预备热身 ===
  thoracicRotation:{en:"Thoracic Rotation",zh:"仰卧胸椎旋转（开胸）",sets:"各5-8次/侧",tip:"躺下来手臂打开，感受胸椎转动。每次训练第一件事。",purpose:"胸椎活动度",pr:"must",yt:"https://www.youtube.com/results?search_query=supine+thoracic+rotation+stretch"},
  windshieldWiper:{en:"Windshield Wiper",zh:"仰卧膝倒（雨刷）",sets:"各10次/侧",tip:"双腿弯起左右倒，髋关节内外旋预热。配合胸椎旋转作为开场。",purpose:"髋关节内外旋预热",pr:"must",yt:"https://www.youtube.com/results?search_query=supine+windshield+wiper+hip+mobility"},
  // === 热身与协调 ===
  crossCrawl:{en:"Cross Crawl",zh:"交叉行进",sets:"1×50-60 或 1分钟",tip:"站立，对侧手膝碰触。一组做完即可。训练对侧协调——改善步态。",purpose:"步态协调",pr:"must",yt:"https://www.youtube.com/results?search_query=cross+crawl+standing+exercise"},
  jumpingJacks:{en:"Jumping Jacks",zh:"开合跳",sets:"1×1分钟",tip:"室内用开合跳替代跳绳。心率微升即可，不需要做到喘。",purpose:"心肺预热",pr:"must",yt:"https://www.youtube.com/results?search_query=jumping+jacks+proper+form"},
  // === 髋关节激活 ===
  hipRotation90:{en:"Hip 90/90",zh:"90/90髋关节旋转转换",sets:"1×20（各10）",tip:"坐姿90/90：前后腿各弯90°，交替转向。感受左右差异。左侧有明显改善趋势。",purpose:"髋关节活动度",pr:"must",yt:"https://www.youtube.com/results?search_query=90+90+hip+mobility+stretch+transition"},
  clamshell:{en:"Clamshell",zh:"蛤蛎式",sets:"左2×15 + 右1×15",tip:"弹力带套膝上方，侧卧屈膝，上方膝盖打开。骨盆不要后翻！**最重要的臀中肌激活动作**。目前轻弹力带。",purpose:"臀中肌激活",pr:"must",yt:"https://www.youtube.com/results?search_query=clamshell+exercise+resistance+band+glute+med"},
  hipAbduction:{en:"Hip Abduction",zh:"侧卧直腿抬高",sets:"2×10/侧",tip:"侧卧伸直腿，脚尖略内旋，缓慢抬起。激活臀中肌后部纤维。",purpose:"臀中肌后部",pr:"must",yt:"https://www.youtube.com/results?search_query=side+lying+hip+abduction+glute+med"},
  // === 单腿稳定 ===
  slGluteBridge:{en:"SL Glute Bridge",zh:"单腿臀桥",sets:"3×7/侧（顶部3秒）",tip:"仰卧屈膝，单腿蹬地抬臀。脚跟驱动，顶部保持3秒，骨盆水平。减少数量提高质量。",purpose:"臀大肌+骨盆稳定",pr:"must",yt:"https://www.youtube.com/results?search_query=single+leg+glute+bridge+form"},
  hipAirplane:{en:"Hip Airplane",zh:"Hip Airplane",sets:"2×10/侧",tip:"单腿站立前倾，躯干缓慢左右旋转。扶椅子慢速，体会髋部转动可控性。右侧控制优于左侧。",purpose:"髋三维控制",pr:"must",yt:"https://www.youtube.com/results?search_query=hip+airplane+exercise+single+leg"},
  slBalance:{en:"SL Balance",zh:"单腿站立",sets:"左右左 3×30s",tip:"赤脚站立。左侧多做一组（左右左）。注意左髋不要向内折叠。",purpose:"Trendelenburg监测",pr:"must",yt:"https://www.youtube.com/results?search_query=single+leg+balance+stand+exercise"},
  lateralBandWalk:{en:"Lateral Band Walk",zh:"弹力带横移",sets:"2-3×15步/方向",tip:"弹力带套踝上方，微蹲横向走。**放最后做**，测试IT Band。左侧先走多一组。用髋带膝盖走，膝盖以下像固定的鞋子。",purpose:"臀中肌功能化（IT Band测试）",pr:"must",yt:"https://www.youtube.com/results?search_query=lateral+band+walk+proper+form"},
  // === 穿插用动作 ===
  deadBug:{en:"Dead Bug",zh:"Dead Bug",sets:"1×10",tip:"仰卧双手双脚朝天，对侧手脚同时伸出，腰椎贴地。蛤蛎式组间穿插用。",purpose:"核心深层稳定（穿插）",pr:"opt",yt:"https://www.youtube.com/results?search_query=dead+bug+exercise+proper+form"},
  // === 拉伸与灵活性（有时间加做）===
  hipFlexorStretch:{en:"Hip Flexor Stretch",zh:"髋屈肌拉伸",sets:"1-2×30s/侧",tip:"半跪姿，后腿侧臀肌收紧，身体微前移。Alex感觉明显，尽量安排。",purpose:"髋屈肌释放",pr:"opt",yt:"https://www.youtube.com/results?search_query=half+kneeling+hip+flexor+stretch"},
  bandedLungePull:{en:"Banded Lunge Pull",zh:"弹力带弓步侧拉",sets:"1-2×30s/侧",tip:"弹力带从侧面拉住前膝做弓步抗阻。大转子前方激活感强烈，尽量安排。",purpose:"深层肌肉激活",pr:"opt",yt:"https://www.youtube.com/results?search_query=banded+lunge+lateral+pull+hip+stability"},
  shortFoot:{en:"Short Foot",zh:"短足训练",sets:"可省略",tip:"日常动作中提醒足弓三点即可，不单独占时间。",purpose:"足弓激活",pr:"opt",yt:"https://www.youtube.com/results?search_query=short+foot+exercise+arch+activation"},
  slCalfRaise:{en:"SL Calf Raise",zh:"单腿提踵",sets:"可省略",tip:"大训练有负重版。如有时间随手做几个。",purpose:"小腿力量",pr:"opt",yt:"https://www.youtube.com/results?search_query=single+leg+calf+raise+full+range"},
  // === 膝关节预热（v3.1新增）===
  wallSit:{en:"Wall Sit",zh:"靠墙静蹲",sets:"2×20-30秒，⏸间隔20秒",tip:"背靠墙，大腿与地面约45-60°（不需要90°），膝盖对准脚尖。让膝关节在轻压下预热，促进关节液分泌。",purpose:"膝关节承重预热",pr:"must",yt:"https://www.youtube.com/results?search_query=wall+sit+exercise+proper+form"},
  heelElevSquat:{en:"Heel-Elevated BW Squat",zh:"垫高徒手深蹲",sets:"1×8（慢速，底部停2秒）",tip:"脚后跟垫1-2cm杠铃片，徒手慢速深蹲。让膝盖在踝关节辅助下适应深蹲轨迹，为后面高脚杯深蹲做准备。",purpose:"深蹲轨迹预适应",pr:"must",yt:"https://www.youtube.com/results?search_query=heel+elevated+bodyweight+squat"},
  // === 旧版保留（历史数据兼容）===
  jumpingJacksStr:{en:"Jumping Jacks",zh:"开合跳（力量预热）",sets:"1×1分钟",tip:"室内开合跳。如果刚做完基础动作可跳过。",purpose:"心肺预热",pr:"opt",legacy:true,yt:"https://www.youtube.com/results?search_query=jumping+jacks+proper+form"},
  boxSquat:{en:"Box Squat",zh:"箱式深蹲（已替换）",sets:"—",tip:"v3.1已被膝关节预热层（Wall Sit+垫高徒手蹲）替代。",purpose:"深蹲前臀肌激活",pr:"opt",legacy:true,yt:"https://www.youtube.com/results?search_query=box+squat+bodyweight+activation"},
  // === 力量超级组 ===
  gobletSquat:{en:"Goblet Squat",zh:"高脚杯深蹲",sets:"3×10",tip:"胸前托哑铃10kg（稳定后回13kg）。**Set1脚后跟垫高（1-2cm杠铃片），做8个慢速适应；Set2-3尝试不垫，如不适继续垫**。站距肩宽，脚尖外转10-15°，左膝推向小脚趾。起身时腰背不要过度前倾。",purpose:"下肢推（主力组）",pr:"must",yt:"https://www.youtube.com/results?search_query=goblet+squat+proper+form+technique"},
  dbReverseFly:{en:"DB Reverse Fly",zh:"俯身哑铃飞鸟",sets:"3×10-15",tip:"2×3.5kg。俯身45°，双臂侧展，肩胛后收。不需要大重量，控制肩胛后收。",purpose:"上背+扣球减速肌",pr:"must",yt:"https://www.youtube.com/results?search_query=dumbbell+reverse+fly+form"},
  slRDL:{en:"Single-Leg RDL",zh:"单腿硬拉",sets:"3×10/侧",tip:"左右均5kg。左侧稳定性在改善但右臀上翘仍明显。暂不减重，重点提高技术质量。**放SS2（深蹲前），激活后链为深蹲的臀肌发力做准备**。",purpose:"后链+平衡（监测项）",pr:"must",yt:"https://www.youtube.com/results?search_query=single+leg+romanian+deadlift+form"},
  dbFloorFly:{en:"DB Bench Fly",zh:"哑铃凳飞鸟",sets:"3×10",tip:"2×3.5kg。哑铃凳上做比地板方便。双臂展开合拢，保护肩。",purpose:"胸肌（保护肩版）",pr:"must",yt:"https://www.youtube.com/results?search_query=dumbbell+bench+chest+fly"},

// ============================================
// HELPERS
// ============================================
function cacheGet(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}
function cacheSet(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function dk(d){if(typeof d==='string')return d;return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function getSessions(dateKey){const arr=cloudData[dateKey];if(!arr)return[];if(Array.isArray(arr))return arr;return[arr];}
function getCurrentSaved(){return getSessions(dk(today)).find(function(s){return s.sessionIdx===currentSessionIdx;})||null;}
function localISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}
function getModuleCompletion(sections){let t=0,d=0;sections.forEach(function(sec){sec.exercises.forEach(function(id){t++;if(draft&&draft.exercises&&draft.exercises[id]&&draft.exercises[id].done)d++;});});return t?Math.round(d/t*100):0;}
function completionBadge(pct){
  if(pct>=80) return '<span class="module-badge done">\u2713 '+pct+'%</span>';
  if(pct>0) return '<span class="module-badge partial">'+pct+'%</span>';
  return '<span class="module-badge empty">0%</span>';
}
function mergeDaySessions(dateKey){
  const sessions=getSessions(dateKey).filter(function(s){return !s.isRest;});
  const merged={exercises:{},monitoring:{},activities:[],notes:[]};let hasStr=false;
  sessions.forEach(function(s){
    if(s.exercises) Object.entries(s.exercises).forEach(function(e){var id=e[0],d=e[1];if(!merged.exercises[id]||d.done) merged.exercises[id]=d;});
    if(s.monitoring) Object.entries(s.monitoring).forEach(function(e){var id=e[0],d=e[1];if(!merged.monitoring[id]||(d.value&&!merged.monitoring[id].value)) merged.monitoring[id]=d;});
    if(s.otherActivities) s.otherActivities.forEach(function(a){if(!merged.activities.includes(a))merged.activities.push(a);});
    if(s.notes) merged.notes.push(s.notes);
    if(s.phase==='full') hasStr=true;
  });
  merged.phase=hasStr?'full':'base';merged.count=sessions.length;return merged;
}

// ============================================
// AUTO-SAVE
// ============================================
function markDirty(){
  draft.notes=document.getElementById('sessionNotes')?.value||'';
  localStorage.setItem('alex_draft',JSON.stringify(draft));
  if(saveState==='saving') return;
  saveState='dirty';updateStatus('saving','未保存');
  if(autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){doSave(true);},5000);
}
function doSave(isAuto){
  if(saveState==='saving'&&isAuto) return;
  if(saveState==='saved') return;
  if(autoSaveTimer){clearTimeout(autoSaveTimer);autoSaveTimer=null;}
  saveState='saving';updateStatus('saving','保存中...');
  const key=dk(today);
  const allEx={};
  [].concat(SECTIONS_BASE,SECTIONS_STR).forEach(function(sec){sec.exercises.forEach(function(id){
    allEx[id]={done:(draft&&draft.exercises&&draft.exercises[id]&&draft.exercises[id].done)||false,actual:(draft&&draft.exercises&&draft.exercises[id]&&draft.exercises[id].actual)||'',note:(draft&&draft.exercises&&draft.exercises[id]&&draft.exercises[id].note)||''};
  });});
  const monData={};
  MON.forEach(function(q){monData[q.id]={value:(draft&&draft.monitoring&&draft.monitoring[q.id]&&draft.monitoring[q.id].value)||'',note:(draft&&draft.monitoring&&draft.monitoring[q.id]&&draft.monitoring[q.id].note)||''};});
  const hasStr=SECTIONS_STR.some(function(sec){return sec.exercises.some(function(id){return allEx[id]&&allEx[id].done;});});
  const sessionData={
    date:key,sessionIdx:currentSessionIdx,phase:hasStr?'full':'base',isRest:isRestDay,
    exercises:allEx,monitoring:monData,otherActivities:draft.otherActivities||[],
    notes:document.getElementById('sessionNotes')?.value||'',savedAt:localISO()
  };
  cloudSave(key,currentSessionIdx,sessionData,function(result){
    saveState='saved';
    if(result&&result.success){updateStatus('synced','已保存');}
    else{updateStatus('error','仅本地');toast('已保存到本地');}
    renderControlBar();
  });
}

// ============================================
// CLOUD SYNC — fetch() 代替 google.script.run
// ============================================
function cloudLoad(callback){
  updateStatus('syncing','连接中...');
  fetch(GAS_API)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(data){
      cloudData=data||{};
      cacheSet(cloudData);isOnline=true;updateStatus('synced','已连通');
      if(callback)callback();
    })
    .catch(function(err){
      console.warn('cloudLoad failed:',err);
      cloudData=cacheGet();isOnline=false;updateStatus('error','离线');
      if(callback)callback();
    });
}
function cloudSave(dateKey,idx,sessionData,callback){
  updateStatus('saving','保存中...');
  if(!cloudData[dateKey])cloudData[dateKey]=[];
  if(!Array.isArray(cloudData[dateKey]))cloudData[dateKey]=[cloudData[dateKey]];
  const ei=cloudData[dateKey].findIndex(function(s){return s.sessionIdx===idx;});
  if(ei>=0)cloudData[dateKey][ei]=sessionData;else cloudData[dateKey].push(sessionData);
  cacheSet(cloudData);
  var body=JSON.stringify({dateKey:dateKey,sessionIdx:idx,sessionJson:JSON.stringify(sessionData)});
  fetch(GAS_API,{method:'POST',body:body})
    .then(function(r){return r.json();})
    .then(function(r){isOnline=true;if(callback)callback(r);})
    .catch(function(e){
      // POST 可能因 CORS 重定向无法读取响应，但数据已发送到服务器
      // 用 no-cors 重试确保数据到达
      fetch(GAS_API,{method:'POST',body:body,mode:'no-cors'})
        .then(function(){isOnline=true;if(callback)callback({success:true});})
        .catch(function(){isOnline=false;if(callback)callback({success:false});});
    });
}

function switchSession(idx){
  currentSessionIdx=idx;
  const saved=getCurrentSaved();
  if(saved){
    draft={exercises:Object.assign({},(saved.exercises||{})),monitoring:Object.assign({},(saved.monitoring||{})),notes:saved.notes||'',otherActivities:[].concat(saved.otherActivities||[])};
    isRestDay=!!saved.isRest;
    var hasStr=SECTIONS_STR.some(function(sec){return sec.exercises.some(function(id){return saved.exercises&&saved.exercises[id]&&saved.exercises[id].done;});});
    strCollapsed=!hasStr;baseCollapsed=false;
  } else {draft={};isRestDay=false;baseCollapsed=false;strCollapsed=true;}
  saveState='saved';updateStatus('synced','已连通');
  renderTraining();
}

  html+='<div class="module-header" onclick="toggleModule(\'base\')"><div class="module-icon icon-base-module">1-5</div><h2>基础训练</h2>'+completionBadge(basePct)+'<span class="chevron">\u25BC</span></div>';
  html+='<div class="module-body">';
  SECTIONS_BASE.forEach(function(sec){html+=renderSection(sec,true);});
  html+='</div></div>';
  html+='<div class="module-card'+(strCollapsed?' collapsed':'')+'" id="mod-str">';
  html+='<div class="module-header" onclick="toggleModule(\'str\')"><div class="module-icon icon-str-module">6+</div><h2>力量训练 + 放松</h2>'+completionBadge(strPct)+'<span class="chevron">\u25BC</span></div>';
  html+='<div class="module-body">';
  SECTIONS_STR.forEach(function(sec){html+=renderSection(sec,false);});
  html+='</div></div>';
  document.getElementById('trainingContent').innerHTML=html;
  var mh='<div class="monitoring"><h3>训练监控</h3>';
  MON.forEach(function(q){
    var sv=(draft&&draft.monitoring&&draft.monitoring[q.id])||{};
    mh+='<div class="monitor-item"><div class="q-text">'+q.text+'</div><div class="chip-group">';
    q.opts.forEach(function(o,i){
      var sel=sv.value===o?' selected':'';
      var sev=i>=q.opts.length-1?' danger':i>=q.opts.length-2?' warn':'';
      mh+='<span class="chip'+sev+sel+'" onclick="selectChip(this,\''+q.id+'\',\''+o+'\')">'+o+'</span>';
    });
    mh+='</div><input type="text" placeholder="补充说明..." value="'+(sv.note||'')+'" onchange="updMon(\''+q.id+'\',\'note\',this.value)" style="margin-top:4px;width:100%;background:var(--surface2);border:2px solid var(--border);color:var(--text);border-radius:10px;padding:6px 12px;font-size:0.8em;font-family:var(--font);min-height:36px;"></div>';
  });
  mh+='</div>';
  document.getElementById('monitoringSection').innerHTML=mh;
  document.getElementById('sessionNotes').value=(draft&&draft.notes)||'';
}

function renderSection(sec,isBase){
  var h='<div class="section" id="sec-'+sec.id+'">';
  h+='<div class="section-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
  h+='<div class="sec-icon '+sec.iconCls+'">'+sec.num+'</div>';
  h+='<h3>'+sec.title+'</h3>';
  if(sec.time) h+='<span class="time-badge">~'+sec.time+'</span>';
  h+='<span class="chevron">\u25BC</span></div>';
  h+='<div class="section-desc">'+sec.desc+'</div>';
  h+='<div class="section-body">';
  if(isBase){
    var must=sec.exercises.filter(function(id){return EX[id].pr==='must';});
    var opt=sec.exercises.filter(function(id){return EX[id].pr==='opt';});
    must.forEach(function(id){h+=renderEx(id);});
    if(must.length>0&&opt.length>0) h+='<div class="priority-divider optional">以下可选，有时间再做</div>';
    opt.forEach(function(id){h+=renderEx(id);});
  } else {
    sec.exercises.forEach(function(id,i){
      h+=renderEx(id);
      if(sec.ss&&i===0) h+='<div class="superset-label">A+B 连做 \u00B7 休息30-45s \u00B7 共3轮</div>';
    });
  }
  if(sec.rope) h+='<div class="rope-break">🔗 开合跳30秒衔接</div>';
  h+='</div></div>';
  return h;
}

function renderEx(id){
  var ex=EX[id],sd=(draft&&draft.exercises&&draft.exercises[id])||{};
  var dc=sd.done?' done':'';
  var h='<div class="ex-capsule'+dc+'" id="ex-'+id+'">';
  h+='<div class="ex-check-wrap"><input type="checkbox" class="ex-check" '+(sd.done?'checked':'')+' onchange="togEx(\''+id+'\',this.checked)"></div>';
  h+='<div class="ex-text"><div class="ex-row1"><span class="ex-name">'+ex.en+'</span><span class="ex-zh">'+ex.zh+'</span>';
  if(ex.pr==='opt') h+='<span class="opt-tag">可选</span>';
  h+='</div><div class="ex-row2"><span class="sets">'+ex.sets+'</span><span class="purpose">'+ex.purpose+'</span></div></div>';
  h+='<div class="ex-actions"><button class="ex-btn ex-btn-tip" onclick="openSheet(\''+id+'\')" title="详情">?</button>';
  h+='<a class="ex-btn ex-btn-yt" href="'+ex.yt+'" target="_blank" title="视频">\u25B6</a></div></div>';
  h+='<div class="ex-inputs"><input class="actual" type="text" placeholder="实际组数/重量" value="'+(sd.actual||'')+'" onchange="updEx(\''+id+'\',\'actual\',this.value)">';
  h+='<input class="note" type="text" placeholder="备注" value="'+(sd.note||'')+'" onchange="updEx(\''+id+'\',\'note\',this.value)"></div>';
  return h;
}

function openSheet(id){var ex=EX[id];if(!ex)return;document.getElementById('sheetTitle').textContent=ex.en+' '+ex.zh;document.getElementById('sheetSubtitle').textContent=ex.sets+' \u00B7 '+ex.purpose;document.getElementById('sheetBody').textContent=ex.tip;document.getElementById('sheetOverlay').classList.add('show');document.getElementById('sheetPanel').classList.add('show');}
function closeSheet(){document.getElementById('sheetOverlay').classList.remove('show');document.getElementById('sheetPanel').classList.remove('show');}
function selectChip(el,qId,val){var g=el.parentElement;var was=el.classList.contains('selected');g.querySelectorAll('.chip').forEach(function(c){c.classList.remove('selected');});if(!was){el.classList.add('selected');updMon(qId,'value',val);}else{updMon(qId,'value','');}}

function toggleActivity(val){
  if(!draft.otherActivities)draft.otherActivities=[];
  if(val==='none'){draft.otherActivities=[];}else{
    var idx=draft.otherActivities.indexOf(val);
    if(idx>=0)draft.otherActivities.splice(idx,1);else draft.otherActivities.push(val);
  }
  markDirty();
  var scrollY=window.scrollY;renderControlBar();requestAnimationFrame(function(){window.scrollTo(0,scrollY);});
}

function togEx(id,c){if(!draft.exercises)draft.exercises={};if(!draft.exercises[id])draft.exercises[id]={};draft.exercises[id].done=c;var e=document.getElementById('ex-'+id);if(e)e.classList.toggle('done',c);markDirty();}
function updEx(id,f,v){if(!draft.exercises)draft.exercises={};if(!draft.exercises[id])draft.exercises[id]={};draft.exercises[id][f]=v;markDirty();}
function updMon(id,f,v){if(!draft.monitoring)draft.monitoring={};if(!draft.monitoring[id])draft.monitoring[id]={};draft.monitoring[id][f]=v;markDirty();}
function loadDraft(){try{draft=JSON.parse(localStorage.getItem('alex_draft'))||{};}catch(e){draft={};}}

// ============================================
// CALENDAR
// ============================================
function renderCalendar(){
  document.getElementById('calTitle').textContent=calY+'\u5E74'+(calM+1)+'\u6708';
  var h='';
  ['\u4E00','\u4E8C','\u4E09','\u56DB','\u4E94','\u516D','\u65E5'].forEach(function(d){h+='<div class="cal-header">'+d+'</div>';});
  var start=new Date(calY,calM,1).getDay()-1;if(start<0)start=6;
  for(var i=0;i<start;i++)h+='<div class="cal-day empty"></div>';
  var days=new Date(calY,calM+1,0).getDate(),now=new Date();
  for(var d=1;d<=days;d++){
    var dt=new Date(calY,calM,d),key=dk(dt),sessions=getSessions(key),isToday=dt.toDateString()===now.toDateString();
    var cls='cal-day';if(isToday)cls+=' today';
    var inner='<div class="day-num">'+d+'</div>';
    if(sessions.length>0){
      cls+=' has-session';var m=mergeDaySessions(key);
      if(sessions.every(function(s){return s.isRest;})){cls+=' rest';inner+='<div class="rest-mark">\u4F11</div>';}
      else{cls+=m.phase==='full'?' full':' base-only';var tE=0,tD=0;Object.values(m.exercises).forEach(function(e){tE++;if(e.done)tD++;});if(tE>0)inner+='<div class="completion">'+Math.round(tD/tE*100)+'%</div>';if(m.count>1)cls+=' multi';}
    }else if(dt<now&&!isToday){inner+='<div class="rest-mark" style="color:var(--border2)">\u00B7</div>';}
    h+='<div class="'+cls+'" onclick="showHist(\''+key+'\')">'+inner+'</div>';
  }
  document.getElementById('calGrid').innerHTML=h;
}
function calNav(dir){calM+=dir;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCalendar();}

function showHist(key){
  var sessions=getSessions(key),el=document.getElementById('historyDetail');
  if(!sessions.length){el.innerHTML='<div class="history-detail"><p style="color:var(--text2)">'+key+'\uFF1A\u65E0\u8BB0\u5F55</p></div>';return;}
  var h='';
  sessions.forEach(function(s,si){
    var label=s.isRest?'\u4F11\u606F\u65E5':s.phase==='full'?'\u57FA\u7840+\u529B\u91CF':'\u57FA\u7840\u8BAD\u7EC3';
    h+='<div class="history-detail"><h3>'+s.date+(sessions.length>1?' \u00B7 \u8BAD\u7EC3'+(si+1):'')+' \u2014 '+label+'</h3>';
    h+='<div class="meta">\u4FDD\u5B58\u4E8E '+(s.savedAt||'');
    if(s.otherActivities&&s.otherActivities.length)h+=' \u00B7 \u5176\u4ED6: '+s.otherActivities.join(', ');
    h+='</div>';
    if(!s.isRest){
      var secs=s.phase==='full'?[].concat(SECTIONS_BASE,SECTIONS_STR):SECTIONS_BASE;
      secs.forEach(function(sec){
        var hasData=sec.exercises.some(function(id){return s.exercises&&s.exercises[id]&&(s.exercises[id].done||s.exercises[id].actual);});
        if(!hasData&&s.phase==='full'&&SECTIONS_BASE.indexOf(sec)>=0)return;
        h+='<div class="history-section-title">'+sec.num+' \u00B7 '+sec.title+'</div>';
        sec.exercises.forEach(function(id){var ex=EX[id],d=(s.exercises&&s.exercises[id])||{};
          h+='<div class="history-exercise"><span class="mark '+(d.done?'done':'skip')+'">'+(d.done?'\u2713':'\u00B7')+'</span><span>'+ex.en+'</span>';
          if(d.actual)h+=' <span class="actual-val">['+d.actual+']</span>';
          if(d.note)h+=' <span class="note-val">\u2014 '+d.note+'</span>';h+='</div>';});
      });
      if(s.monitoring){h+='<div class="history-monitoring"><div class="mon-title">\u76D1\u63A7\u53CD\u998B</div>';
        MON.forEach(function(q){var m=s.monitoring[q.id];if(m&&m.value)h+='<div class="mon-item">'+q.text+' <strong>'+m.value+'</strong>'+(m.note?' \u2014 '+m.note:'')+'</div>';});h+='</div>';}
    }
    if(s.notes)h+='<div class="history-notes">'+s.notes+'</div>';h+='</div>';
  });
  el.innerHTML=h;
}

function renderReport(){
  var allSessions=[];
  Object.values(cloudData).forEach(function(arr){(Array.isArray(arr)?arr:[arr]).forEach(function(s){if(s&&!s.isRest)allSessions.push(s);});});
  allSessions.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  if(!allSessions.length){document.getElementById('reportContent').innerHTML='<div class="report"><p style="color:var(--text2)">\u8FD8\u6CA1\u6709\u8BAD\u7EC3\u8BB0\u5F55\u3002</p></div>';return;}
  var first=new Date(allSessions[0].date),now=new Date(),weeks=Math.max(1,Math.ceil((now-first)/(7*864e5))),period=Math.ceil(weeks/4)||1;
  var full=allSessions.filter(function(s){return s.phase==='full';}).length,base=allSessions.filter(function(s){return s.phase==='base';}).length;
  var tE=0,tD=0;allSessions.forEach(function(s){if(s.exercises)Object.values(s.exercises).forEach(function(e){tE++;if(e.done)tD++;});});
  var avg=tE?Math.round(tD/tE*100):0;
  var actCount={};allSessions.forEach(function(s){if(s.otherActivities)s.otherActivities.forEach(function(a){actCount[a]=(actCount[a]||0)+1;});});
  var h='<div class="report"><h3>\u8BAD\u7EC3\u8FDB\u5C55\u62A5\u544A</h3><div class="subtitle">\u7B2C'+period+'\u4E2A4\u5468\u5468\u671F \u00B7 \u9996\u6B21 '+allSessions[0].date+' \u00B7 \u7D2F\u8BA1'+allSessions.length+'\u6B21</div>';
  h+='<div class="stat-grid"><div class="stat-card"><div class="value">'+allSessions.length+'</div><div class="label">\u603B\u8BAD\u7EC3\u6B21\u6570</div></div>';
  h+='<div class="stat-card"><div class="value">'+full+'/'+base+'</div><div class="label">\u5B8C\u6574/\u57FA\u7840</div></div>';
  h+='<div class="stat-card"><div class="value">'+avg+'%</div><div class="label">\u5E73\u5747\u5B8C\u6210\u7387</div></div>';
  h+='<div class="stat-card"><div class="value">'+weeks+'</div><div class="label">\u8BAD\u7EC3\u5468\u6570</div></div></div>';
  if(Object.keys(actCount).length){
    h+='<div style="margin:10px 0;font-size:.85em;color:var(--text2)">\u5176\u4ED6\u8FD0\u52A8: ';
    Object.entries(actCount).forEach(function(e){h+='<span style="background:var(--purple-light);color:#4c3d99;padding:2px 10px;border-radius:10px;font-weight:600;margin-right:4px">'+e[0]+' \u00D7'+e[1]+'</span>';});
    h+='</div>';
  }
  var exS={};allSessions.forEach(function(s){if(s.exercises)Object.entries(s.exercises).forEach(function(e){var id=e[0],d=e[1];if(!exS[id])exS[id]={t:0,d:0,a:[]};exS[id].t++;if(d.done)exS[id].d++;if(d.actual)exS[id].a.push({date:s.date,actual:d.actual});});});
  h+='<div class="report-section"><h4>\u57FA\u7840\u52A8\u4F5C\u5B8C\u6210\u7387 (1-5)</h4>';
  SECTIONS_BASE.forEach(function(sec){sec.exercises.forEach(function(id){
    var st=exS[id];if(!st)return;var ex=EX[id];if(!ex)return;
    var p=Math.round(st.d/st.t*100),c=p>=80?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
    h+='<div class="progress-item"><div class="plabel"><span>'+ex.en+' '+ex.zh+'</span><span>'+p+'% ('+st.d+'/'+st.t+')</span></div><div class="progress-bar"><div class="fill" style="width:'+p+'%;background:'+c+'"></div></div>';
    if(st.a.length){var l=st.a[st.a.length-1];h+='<div style="font-size:.72em;color:var(--text3)">\u6700\u8FD1: '+l.actual+' ('+l.date+')</div>';}h+='</div>';});});
  h+='</div>';
  h+='<div class="report-section"><h4>\u529B\u91CF\u8BAD\u7EC3\u5B8C\u6210\u7387 (6-13)</h4>';
  SECTIONS_STR.forEach(function(sec){sec.exercises.forEach(function(id){
    var st=exS[id];if(!st)return;var ex=EX[id];if(!ex)return;
    var p=Math.round(st.d/st.t*100),c=p>=80?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
    h+='<div class="progress-item"><div class="plabel"><span>'+ex.en+' '+ex.zh+'</span><span>'+p+'% ('+st.d+'/'+st.t+')</span></div><div class="progress-bar"><div class="fill" style="width:'+p+'%;background:'+c+'"></div></div>';
    if(st.a.length){var l=st.a[st.a.length-1];h+='<div style="font-size:.72em;color:var(--text3)">\u6700\u8FD1: '+l.actual+' ('+l.date+')</div>';}h+='</div>';});});
  h+='</div>';
  h+='<div class="report-section"><h4>\u76D1\u63A7\u8D8B\u52BF</h4>';
  MON.forEach(function(q){var vs=allSessions.filter(function(s){return s.monitoring&&s.monitoring[q.id]&&s.monitoring[q.id].value;}).map(function(s){return{d:s.date,v:s.monitoring[q.id].value,n:s.monitoring[q.id].note};});
    if(vs.length){h+='<div style="margin:8px 0"><div style="font-weight:700;font-size:.85em">'+q.text+'</div>';
      vs.forEach(function(v){var g=v.v.indexOf('\u65E0')>=0||v.v.indexOf('\u5B8C\u5168')>=0||v.v.indexOf('\u6539\u5584')>=0||v.v.indexOf('\u5F88\u597D')>=0;
        h+='<div style="font-size:.8em;padding:1px 0"><span style="color:var(--text3)">'+v.d+'</span> <span style="color:'+(g?'var(--green)':'var(--yellow)')+'">'+v.v+'</span>'+(v.n?' \u2014 <span style="color:var(--text2);font-style:italic">'+v.n+'</span>':'')+'</div>';});h+='</div>';}});
  h+='</div>';
  h+='<div class="report-section"><h4>4\u5468\u8BC4\u4F30\u6E05\u5355</h4>';
  ["\u9AD8\u811A\u676F\u6DF1\u8E72 13kg\u00D73\u00D715\uFF1F\u5DE6\u4FA7\u5F31\u611F\uFF1F","\u5355\u817F\u786C\u62C9\u5DE6\u4FA7 2.5kg\u4E0D\u4EE3\u507F\uFF1F","90/90\u5DE6\u4FA7 \u819D\u76D6\u79BB\u5730\u8DDD\u79BB\u51CF\u5C11\uFF1F","Lateral Band Walk \u6FC0\u6D3B\u540EIT Band\u65E0\u4E0D\u9002\uFF1F","\u6B65\u6001 \u53F3\u811A\u843D\u5730\u4E0B\u6C89\u6539\u5584\uFF1F","\u843D\u5730 \u5DE6\u819D\u5185\u6263\u51CF\u5C11\uFF1F","\u5BF9\u6BD4\u7167\u7247/\u89C6\u9891"].forEach(function(i){h+='<div style="font-size:.82em;padding:3px 0;color:var(--text2)">\u2610 '+i+'</div>';});
  h+='</div></div>';
  h+='<div style="text-align:center;margin:12px 0"><button class="btn-secondary" onclick="exportReport()">\u5BFC\u51FA\u62A5\u544A</button></div>';
  document.getElementById('reportContent').innerHTML=h;
}

function renderAll(){
  var scrollY=window.scrollY,key=dk(today),sessions=getSessions(key);
  if(sessions.length>0){
    var latest=sessions[sessions.length-1];
    currentSessionIdx=latest.sessionIdx||1;
    if(latest.exercises)draft={exercises:Object.assign({},(latest.exercises||{})),monitoring:Object.assign({},(latest.monitoring||{})),notes:latest.notes||'',otherActivities:[].concat(latest.otherActivities||[])};
    isRestDay=!!latest.isRest;
    var hasStr=SECTIONS_STR.some(function(sec){return sec.exercises.some(function(id){return latest.exercises&&latest.exercises[id]&&latest.exercises[id].done;});});
    strCollapsed=!hasStr;baseCollapsed=false;
  }else{loadDraft();}
  saveState='saved';updateStatus('synced','已连通');
  renderTraining();renderCalendar();renderSettings();
  requestAnimationFrame(function(){window.scrollTo(0,scrollY);});
}
